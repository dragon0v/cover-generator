name: Build and Release

# 只有在推送以 'v' 开头的 tag 时才触发，例如 v0.0.5
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # 必须开启写入权限，否则 GitHub Action 无法创建 Release
    permissions:
      contents: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 # 或者你本地使用的 pnpm 版本

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 建议使用 LTS 版本
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run build
        run: pnpm run build

      - name: Compress dist folder
        run: zip -r extension.zip dist/

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
          generate_release_notes: true # 自动根据 commit 生成 Release Note
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}